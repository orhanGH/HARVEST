project:
  name: harvest_1926
  run_dir: runs/harvest_1926

input:
  pdf: data/0000765723_D0001.pdf
  # PDF page numbers are one-based. Tables 7-40 cover Wheat through Raw Silk.
  pages: "44-83"

preprocess:
  crop_paper: true
  crop_padding: 12
  deskew: true
  max_skew_degrees: 3.0
  normalize_illumination: true
  clahe_clip_limit: 2.0
  threshold_method: otsu
  threshold_block_size: 41
  threshold_c: 13

layout:
  expected_columns:
    - country_fr
    - area_1925
    - production_1925
    - yield_1925
    - country_en
  # Only OCR the target-year cells; older-period columns are deliberately skipped.
  column_ranges:
    - [0.000, 0.185]  # French country name
    - [0.320, 0.405]  # Area 1925 (third Area subcolumn)
    - [0.575, 0.660]  # Production 1925 (third Production subcolumn)
    - [0.795, 0.865]  # Yield 1925 (third Yield subcolumn)
    - [0.850, 1.000]  # English country name; snaps to the printed boundary
  # Production-only tables have different numbers of historical columns. The
  # last numeric column is always the requested 1925 value.
  page_profiles:
    - pages: "60-64,69-71,77,83"
      profile_id: production_7_periods
      expected_columns: [country_fr, production_1925, country_en]
      column_ranges: [[0.000, 0.205], [0.710, 0.810], [0.810, 1.000]]
    - pages: "68,72-76"
      profile_id: production_6_periods
      expected_columns: [country_fr, production_1925, country_en]
      column_ranges: [[0.000, 0.220], [0.700, 0.815], [0.815, 1.000]]
    - pages: "82"
      profile_id: production_5_periods
      expected_columns: [country_fr, production_1925, country_en]
      column_ranges: [[0.000, 0.260], [0.680, 0.815], [0.815, 1.000]]
  min_table_width_ratio: 0.65
  min_row_components: 2
  row_merge_factor: 0.85
  cell_padding: 4
  save_debug_overlays: true

ocr:
  region_type: cell
  tesseract:
    languages: eng+fra
    fallback_language: eng
    scale: 2.0
    country_psm: 7
    numeric_psm: 7
  paddle:
    pipeline: table_recognition_v2
    device: gpu
    use_doc_orientation_classify: false
    use_doc_unwarping: false
  chandra:
    method: hf
    batch_size: 1
    max_workers: 1
  surya:
    run_ocr: true
    run_table: true
    keep_server: false

parser:
  target_year: 1925
  table_number_from_title: true
  keep_empty_rows: false
  export_per_product_csv: true
  table_catalog:
    - {pages: "44-45", table_number: "7", product_id: wheat, product_fr: Froment, product_en: Wheat, area_scale: 1000, production_scale: 1000}
    - {pages: "46", table_number: "8", product_id: rye, product_fr: Seigle, product_en: Rye, area_scale: 1000, production_scale: 1000}
    - {pages: "47-48", table_number: "9", product_id: barley, product_fr: Orge, product_en: Barley, area_scale: 1000, production_scale: 1000}
    - {pages: "49", table_number: "10", product_id: oats, product_fr: Avoine, product_en: Oats, area_scale: 1000, production_scale: 1000}
    - {pages: "50", table_number: "11", product_id: spelt, product_fr: Épeautre, product_en: Spelt, area_scale: 1000, production_scale: 1000}
    - {pages: "51", table_number: "12", product_id: meslin, product_fr: Méteil, product_en: Meslin, area_scale: 1000, production_scale: 1000}
